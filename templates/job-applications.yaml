# Job Applications Template (v2 — fractal structure)
# Setup once → repeat per application → wrap up and export

name: "Job Applications"
version: "2.0.0"
description: "Apply to multiple positions with documentation and accountability tracking"
category: "career"

inputs:
  - name: "target_count"
    type: "integer"
    description: "Number of jobs to apply to"
    required: true

  - name: "resume"
    type: "file"
    description: "Path to your resume/CV"
    required: true

  - name: "cover_letter_template"
    type: "file"
    description: "Cover letter template (if needed)"
    required: false

  - name: "job_boards"
    type: "text"
    description: "Comma-separated list of job boards to use"
    required: false
    default: "LinkedIn,Indeed,Glassdoor"

  - name: "target_companies"
    type: "file"
    description: "List of target companies (optional)"
    required: false

record_schema:
  fields:
    - name: "company"
      type: "text"
      description: "Company name"
      required: true
    - name: "position"
      type: "text"
      description: "Job title/position"
      required: true
    - name: "date"
      type: "date"
      description: "Date applied"
      required: true
    - name: "status"
      type: "enum"
      description: "Application status"
      required: true
      default: "Found"
      values:
        - "Found"
        - "Applied"
        - "Interview"
        - "Offer"
        - "Rejected"
        - "Withdrawn"
    - name: "url"
      type: "url"
      description: "Job posting URL"
      required: false
    - name: "reference"
      type: "text"
      description: "Application reference number"
      required: false
    - name: "contact_person"
      type: "text"
      description: "Contact person or recruiter name"
      required: false
    - name: "follow_up_date"
      type: "date"
      description: "Date to follow up"
      required: false
    - name: "salary_range"
      type: "text"
      description: "Salary range (if known)"
      required: false
    - name: "notes"
      type: "text"
      description: "Additional notes about this application"
      required: false

structure:
  id: root
  kind: procedure
  title: Workflow
  steps:
    - id: setup
      kind: procedure
      title: Preparation
      description: Gather materials and plan your search before applying
      steps:
        - id: setup-checklist
          kind: checklist
          title: Setup checklist
          items:
            - kind: checklist
              title: "Review and update resume"
            - kind: checklist
              title: "Prepare cover letter template"
            - kind: checklist
              title: "List target job boards and companies"
            - kind: checklist
              title: "Set a realistic target count for this sprint"

    - id: applications
      kind: procedure
      title: Applications
      repeat:
        count: target_count
      steps:
        - id: apply_one
          kind: procedure
          title: Single application
          description: Find, customize, apply, and log one job
          steps:
            - id: apply-workflow
              kind: procedure
              title: Application workflow
              steps:
                - id: apply-checklist
                  kind: checklist
                  title: Per-application checklist
                  items:
                    - kind: checklist
                      title: "Find a relevant opening"
                    - kind: checklist
                      title: "Review job requirements and fit"
                    - kind: checklist
                      title: "Tailor resume for this role"
                    - kind: checklist
                      title: "Customize cover letter if needed"
                    - kind: checklist
                      title: "Submit application and save confirmation"
            - id: application-log
              kind: log
              title: Application record
              record_schema:
                fields:
                - name: "company"
                  type: "text"
                  required: true
                - name: "position"
                  type: "text"
                  required: true
                - name: "date"
                  type: "date"
                  required: true
                - name: "status"
                  type: "enum"
                  required: true
                  default: "Found"
                  values: ["Found", "Applied", "Interview", "Offer", "Rejected", "Withdrawn"]
                - name: "url"
                  type: "url"
                  required: false
                - name: "reference"
                  type: "text"
                  required: false
                - name: "contact_person"
                  type: "text"
                  required: false
                - name: "follow_up_date"
                  type: "date"
                  required: false
                - name: "salary_range"
                  type: "text"
                  required: false
                - name: "notes"
                  type: "text"
                  required: false

    - id: wrapup
      kind: procedure
      title: Wrap up
      description: Review progress and export your application log
      steps:
        - id: wrapup-checklist
          kind: checklist
          title: Final checklist
          items:
            - kind: checklist
              title: "Review all application records for completeness"
            - kind: checklist
              title: "Export log to spreadsheet"
            - kind: checklist
              title: "Schedule follow-ups where needed"
            - kind: checklist
              title: "Share progress with accountability partner if applicable"
        - id: deliverables
          kind: artifact
          title: Deliverables

outputs:
  - name: "applications_list"
    type: "file"
    description: "Comprehensive spreadsheet of all applications submitted"
    format: "csv|xlsx|google-sheets"
    required: true
    fields:
      - "Company Name"
      - "Job Title"
      - "Date Applied"
      - "Application Status"
      - "Job URL"
      - "Application Reference"
      - "Follow-up Date"
      - "Contact Person"

  - name: "confirmation_emails"
    type: "folder"
    description: "Folder containing application confirmation emails/screenshots"
    required: true

  - name: "customized_materials"
    type: "folder"
    description: "Folder with tailored resumes and cover letters used"
    required: false

metadata:
  tags:
    - "job-search"
    - "career-development"
    - "applications"
  estimated_duration: "2-4 hours total"
  difficulty: "medium"

examples:
  - description: "Create job application note with all inputs"
    command: |
      yoo add "Apply to 10 tech jobs" \
        --template "Job Applications" \
        --input target_count=10 \
        --input resume=~/Documents/resume-2024.pdf

notes: |
  Fractal structure: Preparation (once) → Applications × target_count → Wrap up (once).
  Drill into each application in the TUI to complete its checklist and log row.
